<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashReward Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#38bdf8;
}

.container{
    width:90%;
    max-width:450px;
    margin:auto;
    margin-top:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    margin-bottom:20px;
}

.card h2{
    margin-bottom:20px;
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:12px;
    background:#334155;
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#94a3b8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:18px;
}

button:hover{
    background:#0ea5e9;
}

.hidden{
    display:none;
}

.wallet{
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    padding:20px;
    border-radius:20px;
}

.balance{
    font-size:35px;
    font-weight:700;
    margin-top:10px;
}

.small{
    color:#dbeafe;
    margin-top:5px;
}

.notice{
    margin-top:15px;
    padding:12px;
    background:rgba(255,255,255,0.1);
    border-radius:12px;
    font-size:14px;
}

.status{
    margin-top:15px;
    text-align:center;
    color:#22c55e;
    font-weight:500;
}

footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
}

</style>
</head>

<body>

<header>
    <div class="logo">CashReward Pro</div>
</header>

<div class="container">

<!-- REGISTER -->

<div class="card" id="registerPage">

    <h2>Create Account</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="registerUser()">
        Register Account
    </button>

</div>

<!-- DASHBOARD -->

<div class="card hidden" id="dashboardPage">

    <h2>Dashboard</h2>

    <div class="wallet">

        <h3>Hello, <span id="showUser"></span></h3>

        <div class="balance">$50.00</div>

        <div class="small">₦75,000 NGN</div>

        <div class="notice">
            Demo reward balance for learning/project purposes.
        </div>

    </div>

    <!-- MEMBERSHIP -->

    <div class="notice" style="margin-top:20px;">
        Premium Membership Access: $10
    </div>

    <input type="text" id="giftCode" placeholder="Enter Gift Card Code">

    <button onclick="activateMembership()">
        Activate Membership
    </button>

    <div class="status" id="membershipStatus"></div>

    <!-- WITHDRAW -->

    <input type="number" id="withdrawAmount" placeholder="Withdrawal Amount">

    <button onclick="withdrawFunds()">
        Withdraw
    </button>

    <div class="status" id="withdrawStatus"></div>

</div>

</div>

<footer>
    ©️ 2026 CashReward Pro
</footer>

<script>

let premium = false;

function registerUser(){

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(username == "" || email == "" || password == ""){

        alert("Please fill all fields");

        return;
    }

    document.getElementById("registerPage").classList.add("hidden");

    document.getElementById("dashboardPage").classList.remove("hidden");

    document.getElementById("showUser").innerText = username;

}

function activateMembership(){

    let gift = document.getElementById("giftCode").value;

    if(gift == ""){

        alert("Enter gift card code");

        return;
    }

    premium = true;

    document.getElementById("membershipStatus").innerHTML =
    "Premium Membership Activated.";

}

function withdrawFunds(){

    let amount = document.getElementById("withdrawAmount").value;

    if(!premium){

        document.getElementById("withdrawStatus").innerHTML =
        "Activate membership first.";

        return;
    }

    if(amount == ""){

        alert("Enter withdrawal amount");

        return;
    }

    document.getElementById("withdrawStatus").innerHTML =
    "Withdrawal request submitted.";

}

</script>

</body>
</html>
